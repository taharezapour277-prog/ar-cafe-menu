<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR Cafe Menu</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <!-- WebXR dom-overlay root -->
    <div id="ui-overlay">
      <!-- shown while scanning surface -->
      <div id="ar-hint">🔍 در حال اسکن سطح…</div>

      <!-- loading spinner -->
      <div id="loadingIndicator">
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
        <div class="loading-label">در حال بارگذاری مدل…</div>
      </div>

      <!-- bottom info panel -->
      <div id="bottom-panel">
        <div id="indexDots"></div>

        <div class="top-row">
          <div id="name">پیتزا پپرونی</div>
          <div id="price">230,000</div>
        </div>

        <div id="description">بیکن ۹۸٪، قارچ، پنیر پیتزا و...</div>

        <div class="nav-row">
          <!-- in RTL + row-reverse: prevBtn renders on the right, nextBtn on the left -->
          <button class="switch-btn" id="prevBtn">قبلی ▶</button>
          <button class="switch-btn" id="nextBtn">◀ بعدی</button>
        </div>

        <button id="orderBtn">🛒 سفارش این محصول</button>

        <div class="brand">
          Powered by
          <a href="https://yourwebsite.com" target="_blank">Brand</a>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
