<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR Cafe Menu</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- ═══════════════════════════════════════════════════════════
         WebXR dom-overlay root — همه چیز داخل این div باشه
         تا در AR هم interactive باشن
         ═══════════════════════════════════════════════════════════ -->
    <div id="ui-overlay">
      <!-- نشانگر اسکن سطح -->
      <div id="ar-hint">🔍 Scanning for a surface…</div>

      <!-- لودینگ اسپینر -->
      <div id="loadingIndicator">
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
        <div class="loading-label">Loading model…</div>
      </div>

      <!-- ═══════════════════════════════════════════════════
           پنل مخصوص AR — فقط در حالت AR نمایش داده می‌شه
           این بخش باید داخل ui-overlay باشه تا در AR کار کنه
           ═══════════════════════════════════════════════════ -->
      <div id="ar-panel">
        <!-- دکمه toggle برای پنهان/نمایش جزئیات -->
        <button
          id="ar-toggle-btn"
          class="ar-toggle-btn"
          aria-label="Toggle details"
        >
          <span id="ar-toggle-icon">▼</span>
          <span id="ar-toggle-label">جزئیات</span>
        </button>

        <!-- محتوای قابل hide/show -->
        <div id="ar-details-panel">
          <!-- ردیف نام + قیمت -->
          <div class="ar-top-row">
            <div id="ar-name" class="ar-product-name">Pepperoni Pizza</div>
            <div id="ar-price" class="ar-product-price">$14</div>
          </div>

          <!-- توضیح محصول -->
          <div id="ar-desc" class="ar-desc-text">
            Pepperoni, mozzarella cheese, olives and mushroom.
          </div>

          <!-- دکمه‌های ناوبری + نقاط -->
          <div class="ar-nav-row">
            <button
              class="ar-nav-btn"
              id="ar-prevBtn"
              aria-label="Previous product"
            >
              ‹
            </button>
            <div id="ar-dots" class="ar-dots-container"></div>
            <button
              class="ar-nav-btn"
              id="ar-nextBtn"
              aria-label="Next product"
            >
              ›
            </button>
          </div>

          <!-- دکمه سفارش -->
          <button id="ar-orderBtn" class="ar-order-btn">
            🛒 Order This Pizza
          </button>
        </div>
        <!-- /ar-details-panel -->
      </div>
      <!-- /ar-panel -->

      <!-- ═══════════════════════════════════════════════════
           پنل معمولی سایت — فقط خارج از AR نمایش داده می‌شه
           ═══════════════════════════════════════════════════ -->
      <div id="bottom-panel">
        <div id="indexDots"></div>

        <div class="top-row">
          <div id="name">Pepperoni Pizza</div>
          <div id="price">$14</div>
        </div>

        <div id="description">
          Pepperoni, mozzarella cheese, olives and mushroom.
        </div>

        <div class="nav-row">
          <button class="switch-btn" id="prevBtn">◀ قبلی</button>
          <button class="switch-btn" id="nextBtn">بعدی ▶</button>
        </div>

        <button id="orderBtn">🛒 Order This Pizza</button>

        <div class="brand">
          Powered by
          <a href="https://yourwebsite.com" target="_blank">YourBrand AR</a>
        </div>
      </div>
      <!-- /bottom-panel -->
    </div>
    <!-- /ui-overlay -->

    <script type="module" src="./app.js"></script>
  </body>
</html>
