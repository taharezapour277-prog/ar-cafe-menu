<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR Cafe Menu</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap");

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Vazirmatn", "Segoe UI", system-ui, Arial, sans-serif;
        width: 100vw;
        height: 100vh;
        direction: rtl;
      }

      canvas {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        display: block;
      }

      /* ── AR overlay root ── */
      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        direction: rtl;
      }

      /* ── AR hint ── */
      #ar-hint {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 15px;
        letter-spacing: 0;
        padding: 11px 22px;
        border-radius: 99px;
        border: 1px solid rgba(255, 216, 110, 0.35);
        white-space: nowrap;
        pointer-events: none;
        font-family: "Vazirmatn", sans-serif;
      }

      /* ── Loading indicator ── */
      #loadingIndicator {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
        z-index: 20;
      }
      #loadingIndicator.visible {
        display: flex;
      }

      .loading-dots {
        display: flex;
        gap: 8px;
        /* RTL: keep dots order natural */
        direction: ltr;
      }
      .loading-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ffd86e;
        animation: bounce 0.9s infinite ease-in-out;
      }
      .loading-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loading-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .loading-label {
        color: #ffd86e;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        font-family: "Vazirmatn", sans-serif;
      }

      /* ── Bottom panel ── */
      #bottom-panel {
        width: calc(100% - 32px);
        max-width: 420px;
        margin-bottom: 100px;
        padding: 18px 20px 14px;
        background: rgba(8, 8, 16, 0.84);
        border: 1px solid rgba(255, 210, 80, 0.28);
        border-radius: 24px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: all;
        transition: opacity 0.3s;
        direction: rtl;
        text-align: right;
      }

      #bottom-panel.ar-active {
        display: none;
      }

      /* dots */
      #indexDots {
        display: flex;
        gap: 7px;
        justify-content: center;
        margin-bottom: 2px;
        direction: ltr; /* keep visual dot order LTR */
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.28);
        transition:
          background 0.3s,
          transform 0.3s;
      }
      .dot.active {
        background: #ffd86e;
        transform: scale(1.25);
      }

      /* name + price row */
      .top-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        flex-direction: row; /* name right, price left in RTL */
      }
      #name {
        color: #ffd86e;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.4;
        font-family: "Vazirmatn", sans-serif;
        /* name is the first flex child → appears on the right in RTL */
      }
      #price {
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        white-space: nowrap;
        background: rgba(255, 216, 110, 0.12);
        border: 1px solid rgba(255, 216, 110, 0.35);
        border-radius: 10px;
        padding: 2px 10px;
        /* numbers stay LTR so they read correctly */
        direction: ltr;
        font-family: "Vazirmatn", sans-serif;
      }

      #description {
        color: rgba(255, 255, 255, 0.65);
        font-size: 13px;
        line-height: 1.8;
        font-family: "Vazirmatn", sans-serif;
        text-align: right;
      }

      /* nav row */
      .nav-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 4px;
        /* In RTL: "قبلی" (prev) should be on the right, "بعدی" (next) on the left
           We reverse the visual order so ◀ قبلی is on the right */
        flex-direction: row-reverse;
      }
      .switch-btn {
        flex: 1;
        background: rgba(255, 210, 80, 0.1);
        border: 1px solid rgba(255, 210, 80, 0.35);
        color: #ffd86e;
        font-size: 14px;
        font-weight: 600;
        border-radius: 12px;
        padding: 9px 0;
        cursor: pointer;
        transition: background 0.2s;
        pointer-events: all;
        font-family: "Vazirmatn", sans-serif;
      }
      .switch-btn:active {
        background: rgba(255, 210, 80, 0.28);
      }

      /* order button */
      #orderBtn {
        background: linear-gradient(135deg, #ffd86e 0%, #ffa940 100%);
        color: #1a0800;
        font-size: 15px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        padding: 12px 0;
        width: 100%;
        cursor: pointer;
        margin-top: 2px;
        pointer-events: all;
        transition:
          opacity 0.2s,
          transform 0.15s;
        font-family: "Vazirmatn", sans-serif;
        letter-spacing: 0;
      }
      #orderBtn:active {
        opacity: 0.82;
        transform: scale(0.98);
      }

      /* brand */
      .brand {
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 2px;
        /* brand line has mixed LTR content — keep it neutral */
        direction: ltr;
        font-family: "Vazirmatn", sans-serif;
      }
      .brand a {
        color: rgba(255, 216, 110, 0.55);
        text-decoration: none;
      }

      /* ── WebXR button ── */
      #ARButton {
        position: fixed !important;
        bottom: 24px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        z-index: 100 !important;
      }
    </style>
  </head>

  <body>
    <!-- WebXR dom-overlay root -->
    <div id="ui-overlay">
      <!-- shown while scanning surface -->
      <div id="ar-hint">🔍 در حال اسکن سطح…</div>

      <!-- loading spinner -->
      <div id="loadingIndicator">
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
        <div class="loading-label">در حال بارگذاری مدل…</div>
      </div>

      <!-- bottom info panel -->
      <div id="bottom-panel">
        <div id="indexDots"></div>

        <div class="top-row">
          <div id="name">پیتزا پپرونی</div>
          <div id="price">230,000</div>
        </div>

        <div id="description">بیکن ۹۸٪، قارچ، پنیر پیتزا و...</div>

        <div class="nav-row">
          <!-- in RTL + row-reverse: prevBtn renders on the right, nextBtn on the left -->
          <button class="switch-btn" id="prevBtn">قبلی ▶</button>
          <button class="switch-btn" id="nextBtn">◀ بعدی</button>
        </div>

        <button id="orderBtn">🛒 سفارش این محصول</button>

        <div class="brand">
          Powered by
          <a href="https://yourwebsite.com" target="_blank">YourBrand AR</a>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
