<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>AR Cafe Menu</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- WebXR dom-overlay root -->
    <div id="ui-overlay">
      <!-- shown while scanning surface -->
      <div id="ar-hint">🔍 Scanning for a surface…</div>

      <!-- loading spinner -->
      <div id="loadingIndicator">
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
        <div class="loading-label">Loading model…</div>
      </div>

      <!-- bottom info panel (hidden in AR — 3D label takes over) -->
      <div id="bottom-panel">
        <div id="indexDots"></div>

        <div class="top-row">
          <div id="name">Pepperoni Pizza3</div>
          <div id="price">$14</div>
        </div>

        <div id="description">
          Pepperoni, mozzarella cheese, olives and mushroom.
        </div>

        <div class="nav-row">
          <button class="switch-btn" id="prevBtn">◀ قبلی</button>
          <button class="switch-btn" id="nextBtn">بعدی ▶</button>
        </div>

        <button id="orderBtn">🛒 Order This Pizza</button>

        <div class="brand">
          Powered by
          <a href="https://yourwebsite.com" target="_blank">YourBrand AR</a>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
